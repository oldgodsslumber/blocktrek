const Game = {
  score: 0, streak: 0, maxStreak: 0, linesCleared: 0, turnsPlayed: 0,
  pieces: [], holdSlots: [], livesLeft: 0, bombsLeft: 0, shufflesLeft: 0,
  shieldTurns: 0, bombMode: false, cleanerMode: null, running: false,
  tourMode: false, tourLevel: null,

  start() {
    this.tourMode = false;
    this.tourLevel = null;
    Board.init(10);
    this._initCommon();
    this.pieces = PieceFactory.generate(3);
    this.running = true;
    this.saveRun();
    Renderer.init(Board.size);
    Renderer.renderAll();
  },

  startTourLevel(levelIdx) {
    const level = WORLD_TOUR_BY_ID[levelIdx] || WORLD_TOUR.find(l => l.id === levelIdx);
    this.tourMode = true;
    this.tourLevel = level;
    Board.init(level.grid, level);
    this._initCommon();
    this.pieces = PieceFactory.generate(3);
    this.running = true;
    this.saveRun();
    Renderer.init(Board.size);
    Renderer.renderAll();

    // Show intro if applicable
    if (level.intro && !TourSave.seenIntros.includes(level.id)) {
      this._showIntro(level);
    }
  },

  _initCommon() {
    this.score = 0; this.streak = 0; this.maxStreak = 0;
    this.linesCleared = 0; this.turnsPlayed = 0;
    this.bombMode = false;
    this.cleanerMode = null;

    const holdCount = SaveData.getTier('hold1') + SaveData.getTier('hold2');
    this.holdSlots = Array(holdCount).fill(null);

    if (this.tourMode) {
      // Tour mode: consumables come from TourSave
      this.livesLeft = TourSave.tourLives + TourSave.bonusLives;
      this.bombsLeft = TourSave.tourBombs;
      this.shufflesLeft = TourSave.tourShuffles;
    } else {
      // Free play: consumables come from SaveData upgrades
      this.livesLeft = SaveData.getTier('life1') + SaveData.getTier('life2') + SaveData.getTier('life3');
      this.bombsLeft = SaveData.getTier('bomb');
      this.shufflesLeft = SaveData.getTier('shuffle');
    }
    this.shieldTurns = 0;
  },

  _showIntro(level) {
    const overlay = document.createElement('div');
    overlay.className = 'intro-overlay';
    overlay.innerHTML = `<div class="intro-card">
      <h3>${level.town}</h3>
      <p>${level.intro}</p>
      <button class="btn btn-primary" style="padding:10px 30px;" id="intro-dismiss">Got it!</button>
    </div>`;
    document.body.appendChild(overlay);
    document.getElementById('intro-dismiss').addEventListener('click', () => {
      overlay.remove();
      TourSave.seenIntros.push(level.id);
      TourSave.save();
    });
  },

  saveRun() {
    if (!this.running) return;
    const key = this.tourMode ? 'blocktrek_tour_run' : 'blocktrek_run';
    localStorage.setItem(key, JSON.stringify({
      grid: Board.grid,
      gridSize: Board.size,
      score: this.score, streak: this.streak, maxStreak: this.maxStreak,
      linesCleared: this.linesCleared, turnsPlayed: this.turnsPlayed,
      pieces: this.pieces, holdSlots: this.holdSlots,
      livesLeft: this.livesLeft, bombsLeft: this.bombsLeft,
      shufflesLeft: this.shufflesLeft, shieldTurns: this.shieldTurns,
      tourMode: this.tourMode,
      tourLevelId: this.tourLevel ? this.tourLevel.id : null
    }));
  },

  clearRunSave() {
    localStorage.removeItem('blocktrek_run');
  },

  clearTourRunSave() {
    localStorage.removeItem('blocktrek_tour_run');
  },

  hasSavedRun() {
    return !!localStorage.getItem('blocktrek_run');
  },

  hasSavedTourRun() {
    return !!localStorage.getItem('blocktrek_tour_run');
  },

  resumeRun() {
    return this._resume('blocktrek_run');
  },

  resumeTourRun() {
    return this._resume('blocktrek_tour_run');
  },

  _resume(key) {
    try {
      const d = JSON.parse(localStorage.getItem(key));
      if (!d) return false;
      Board.size = d.gridSize || 10;
      Board.grid = d.grid;
      this.score = d.score; this.streak = d.streak; this.maxStreak = d.maxStreak;
      this.linesCleared = d.linesCleared; this.turnsPlayed = d.turnsPlayed;
      this.pieces = d.pieces; this.holdSlots = d.holdSlots;
      this.livesLeft = d.livesLeft; this.bombsLeft = d.bombsLeft;
      this.shufflesLeft = d.shufflesLeft; this.shieldTurns = d.shieldTurns;
      this.bombMode = false;
      this.cleanerMode = null;
      this.tourMode = d.tourMode || false;
      if (this.tourMode && d.tourLevelId !== null && d.tourLevelId !== undefined) {
        this.tourLevel = WORLD_TOUR_BY_ID[d.tourLevelId] || WORLD_TOUR.find(l => l.id === d.tourLevelId);
      } else {
        this.tourLevel = null;
      }
      this.running = true;
      Renderer.init(Board.size);
      Renderer.renderAll();
      return true;
    } catch(e) {
      localStorage.removeItem(key);
      return false;
    }
  },

  getAllActivePieces() {
    const all = [...this.pieces.filter(p => !p.placed)];
    this.holdSlots.forEach(p => { if (p) all.push(p); });
    return all;
  },

  checkTourWin() {
    if (!this.tourMode || !this.tourLevel) return false;
    const level = this.tourLevel;
    const scoreMet = level.scoreTarget <= 0 || this.score >= level.scoreTarget;
    const linesMet = level.linesTarget <= 0 || this.linesCleared >= level.linesTarget;
    return scoreMet && linesMet;
  },

  winTourLevel() {
    this.running = false;
    const key = 'blocktrek_tour_run';
    localStorage.removeItem(key);

    const level = this.tourLevel;

    // Calculate stars (same formula as endRun)
    const starScore = Math.floor(this.score / 500);
    const starLines = Math.floor(this.linesCleared / 5);
    const starCombo = Math.floor(this.maxStreak * 2);
    const starSurvival = Math.floor(this.turnsPlayed / 10);
    const totalStars = starScore + starLines + starCombo + starSurvival;

    // Tour stars go to TourSave, not SaveData
    TourSave.stars += totalStars;

    // Still track global stats
    SaveData.totalLinesCleared += this.linesCleared;
    SaveData.save();

    // Mark completed and unlock next levels
    TourSave.complete(level.id);
    const prevBest = TourSave.bestScores[level.id] || 0;
    if (this.score > prevBest) TourSave.bestScores[level.id] = this.score;

    if (level.next) {
      level.next.forEach(nid => TourSave.unlock(nid));
    }

    // Handle reward
    if (level.reward === 'bonusLife') {
      TourSave.bonusLives++;
    }
    TourSave.save();

    // Show level complete screen
    Renderer.showLevelComplete({
      town: level.town,
      score: this.score,
      scoreTarget: level.scoreTarget,
      lines: this.linesCleared,
      linesTarget: level.linesTarget,
      starScore, starLines, starCombo, starSurvival, totalStars,
      reward: level.reward
    });
  },

  tickShards() {
    let changed = false;
    for (let r = 0; r < Board.size; r++) {
      for (let c = 0; c < Board.size; c++) {
        const cell = Board.grid[r][c];
        if (cell && cell.type === 'shard') {
          cell.turnsLeft--;
          if (cell.turnsLeft <= 0) {
            Board.grid[r][c] = null;
          }
          changed = true;
        }
      }
    }
    if (changed) {
      Renderer.renderBoard();
    }
  },

  async placePiece(pieceIdx, row, col, fromHold = false) {
    const piece = fromHold ? this.holdSlots[pieceIdx] : this.pieces[pieceIdx];
    if (!piece || piece.placed) return false;
    if (!Board.canPlace(piece.cells, row, col)) return false;

    Board.place(piece.cells, row, col, piece.color);
    const cellCount = piece.cells.length;

    if (fromHold) {
      this.holdSlots[pieceIdx] = null;
    } else {
      piece.placed = true;
    }

    // Check clears
    const { rows, cols } = Board.checkClears();
    const totalLines = rows.length + cols.length;
    let lineScore = 0;

    if (totalLines > 0) {
      // Animate clearing
      await Renderer.animateClear(rows, cols);
      Board.clearLines(rows, cols);

      this.streak++;
      if (this.streak > this.maxStreak) this.maxStreak = this.streak;
      this.linesCleared += totalLines;

      const streakMult = 1 + 0.5 * (this.streak - 1);
      const scoreMultBonus = SaveData.getTier('scoreMult') * 0.10;
      lineScore = Math.floor(totalLines * totalLines * 100 * streakMult * (1 + scoreMultBonus));
      this.score += lineScore;

      Renderer.showCombo(lineScore, this.streak, totalLines);
    } else {
      // No clear this turn
      const shieldMax = SaveData.getTier('streakShield');
      if (this.streak > 0 && shieldMax > 0 && this.shieldTurns < shieldMax) {
        this.shieldTurns++;
      } else {
        this.streak = 0;
        this.shieldTurns = 0;
      }
    }

    // Placement points
    const scoreMultBonus = SaveData.getTier('scoreMult') * 0.10;
    this.score += Math.floor(cellCount * (1 + scoreMultBonus));

    Renderer.renderBoard();
    Renderer.renderPieces();
    Renderer.renderHUD();

    // Check tour win
    if (this.tourMode && this.checkTourWin()) {
      this.winTourLevel();
      return true;
    }

    // Check if all tray pieces placed -> new round
    if (this.pieces.every(p => p.placed)) {
      this.turnsPlayed++;
      this.pieces = PieceFactory.generate(3);
      // Tick shards when new pieces are dealt
      this.tickShards();
      Renderer.renderPieces();
    }

    // Check game over
    if (!Board.canAnyFit(this.getAllActivePieces())) {
      await this.handleStuck();
    }

    this.saveRun();
    return true;
  },

  async handleStuck() {
    if (this.livesLeft > 0) {
      this.livesLeft--;
      if (this.tourMode) {
        TourSave.tourLives = Math.max(0, TourSave.tourLives - 1);
        TourSave.save();
      }
      await Renderer.showRescue();
      const { rows, cols } = Board.getMostFilledRowsCols(2);
      await Renderer.animateClear(rows, cols);
      Board.clearLines(rows, cols);
      this.streak = 0;
      this.shieldTurns = 0;
      Renderer.renderBoard();
      Renderer.renderHUD();

      // Still stuck after rescue?
      if (!Board.canAnyFit(this.getAllActivePieces())) {
        this.endRun();
      }
    } else {
      this.endRun();
    }
  },

  async useBomb(row, col) {
    let cleared = 0;
    for (let r = row - 1; r <= row + 1; r++) {
      for (let c = col - 1; c <= col + 1; c++) {
        if (r >= 0 && r < Board.size && c >= 0 && c < Board.size && Board.grid[r][c]) {
          // Bombs clear everything EXCEPT walls (including glass and shards)
          if (Board.grid[r][c].type === 'wall') continue;
          Board.grid[r][c] = null;
          cleared++;
        }
      }
    }
    this.bombsLeft--;
    if (this.tourMode) {
      TourSave.tourBombs = Math.max(0, TourSave.tourBombs - 1);
      TourSave.save();
    }
    this.bombMode = false;
    Renderer.renderBoard();
    Renderer.renderHUD();
    Renderer.renderConsumables();

    // Check if pieces can now fit
    if (!Board.canAnyFit(this.getAllActivePieces())) {
      await this.handleStuck();
    }
    this.saveRun();
  },

  async useCleaner(row, col, cleanerSize) {
    const halfSize = Math.floor(cleanerSize / 2);
    let changed = false;
    for (let r = row - halfSize; r <= row + halfSize; r++) {
      for (let c = col - halfSize; c <= col + halfSize; c++) {
        if (r >= 0 && r < Board.size && c >= 0 && c < Board.size && Board.grid[r][c]) {
          const cell = Board.grid[r][c];
          if (cell.type === 'stone' || cell.type === 'ice' || cell.type === 'glass') {
            Board.grid[r][c] = { color: cell.color, type: 'normal' };
            changed = true;
          } else if (cell.type === 'shard') {
            Board.grid[r][c] = null;
            changed = true;
          }
          // wall and normal are not affected
        }
      }
    }

    // Decrement cleaner count
    const sizeKey = cleanerSize === 1 ? 'cleaners1x1' : cleanerSize === 2 ? 'cleaners2x2' : 'cleaners3x3';
    TourSave[sizeKey] = Math.max(0, TourSave[sizeKey] - 1);
    TourSave.save();

    this.cleanerMode = null;
    Renderer.renderBoard();
    Renderer.renderHUD();
    Renderer.renderConsumables();

    // Check if pieces can now fit
    if (!Board.canAnyFit(this.getAllActivePieces())) {
      await this.handleStuck();
    }
    this.saveRun();
  },

  useShuffle() {
    if (this.shufflesLeft <= 0) return;
    this.shufflesLeft--;
    if (this.tourMode) {
      TourSave.tourShuffles = Math.max(0, TourSave.tourShuffles - 1);
      TourSave.save();
    }
    // Re-roll unplaced pieces only
    const newPieces = PieceFactory.generate(3);
    this.pieces.forEach((p, i) => {
      if (!p.placed) {
        this.pieces[i] = newPieces[i];
        this.pieces[i].id = i;
      }
    });
    Renderer.renderPieces();
    Renderer.renderConsumables();
    this.saveRun();
  },

  clonePiece(piece) {
    return { id: piece.id, name: piece.name, cells: piece.cells.map(c => [...c]), color: piece.color, placed: piece.placed, rotation: piece.rotation };
  },

  holdPiece(pieceIdx) {
    if (this.holdSlots.length === 0) return;
    const piece = this.pieces[pieceIdx];
    if (!piece || piece.placed) return;

    // Only small and medium pieces can be held (large = 5+ cells)
    if (piece.cells.length >= 5) return;

    // Find empty hold slot
    let slotIdx = this.holdSlots.findIndex(s => s === null);
    if (slotIdx === -1) {
      // Swap with first hold slot
      slotIdx = 0;
      const held = this.holdSlots[slotIdx];
      this.holdSlots[slotIdx] = this.clonePiece(piece);
      this.pieces[pieceIdx] = held;
      held.id = pieceIdx;
      held.placed = false;
    } else {
      this.holdSlots[slotIdx] = this.clonePiece(piece);
      // Mark tray slot as empty placeholder
      this.pieces[pieceIdx] = { id: pieceIdx, name: '', cells: [[0,0]], color: '', placed: true, rotation: 0 };
    }

    Renderer.renderPieces();
    Renderer.renderHoldSlots();
    this.saveRun();
  },

  retrieveHold(slotIdx) {
    const piece = this.holdSlots[slotIdx];
    if (!piece) return;
    // Find empty tray spot
    const emptyIdx = this.pieces.findIndex(p => p.placed);
    if (emptyIdx === -1) return; // tray full
    this.pieces[emptyIdx] = piece;
    piece.id = emptyIdx;
    piece.placed = false;
    this.holdSlots[slotIdx] = null;
    Renderer.renderPieces();
    Renderer.renderHoldSlots();
    this.saveRun();
  },

  rotatePiece(pieceIdx) {
    if (!SaveData.hasUpgrade('rotation')) return;
    const piece = this.pieces[pieceIdx];
    if (!piece || piece.placed) return;
    piece.cells = PieceFactory.rotateCW(piece.cells);
    // Normalize to start from 0,0
    const minR = Math.min(...piece.cells.map(c => c[0]));
    const minC = Math.min(...piece.cells.map(c => c[1]));
    piece.cells = piece.cells.map(([r, c]) => [r - minR, c - minC]);
    piece.rotation = (piece.rotation + 1) % 4;
    Renderer.renderPieces();
  },

  endRun() {
    this.running = false;

    if (this.tourMode) {
      this.clearTourRunSave();
    } else {
      this.clearRunSave();
    }

    SaveData.totalRuns++;
    SaveData.totalLinesCleared += this.linesCleared;
    const isNewBest = !this.tourMode && this.score > SaveData.bestScore;
    if (isNewBest) SaveData.bestScore = this.score;

    // Calculate stars
    const starScore = Math.floor(this.score / 500);
    const starLines = Math.floor(this.linesCleared / 5);
    const starCombo = Math.floor(this.maxStreak * 2);
    const starSurvival = Math.floor(this.turnsPlayed / 10);
    const totalStars = starScore + starLines + starCombo + starSurvival;

    if (this.tourMode) {
      // Tour stars go to TourSave
      TourSave.stars += totalStars;
      TourSave.save();
    } else {
      // Regular stars go to SaveData
      SaveData.stars += totalStars;
      SaveData.totalStarsEarned += totalStars;
    }
    SaveData.save();

    if (this.tourMode) {
      // Tour fail - full reset
      Renderer.showTourOver({
        score: this.score, lines: this.linesCleared, maxStreak: this.maxStreak,
        turns: this.turnsPlayed, starScore, starLines, starCombo, starSurvival,
        totalStars,
        tourLevelId: this.tourLevel ? this.tourLevel.id : null,
        levelsCompleted: TourSave.completed.length
      });
    } else {
      Renderer.showGameOver({
        score: this.score, lines: this.linesCleared, maxStreak: this.maxStreak,
        turns: this.turnsPlayed, starScore, starLines, starCombo, starSurvival,
        totalStars, isNewBest
      });
    }
  }
};

// ===== RENDERER =====
const Renderer = {
  boardEl: null, trayEl: null, currentGridSize: 10,

  init(gridSize) {
    gridSize = gridSize || 10;
    this.currentGridSize = gridSize;
    this.boardEl = document.getElementById('board');
    this.trayEl = document.getElementById('piece-tray');
    // Set grid template dynamically
    this.boardEl.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
    this.boardEl.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;
    // Create board cells
    this.boardEl.innerHTML = '';
    for (let r = 0; r < gridSize; r++) {
      for (let c = 0; c < gridSize; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.row = r;
        cell.dataset.col = c;
        this.boardEl.appendChild(cell);
      }
    }
  },

  renderAll() {
    this.renderBoard();
    this.renderPieces();
    this.renderHUD();
    this.renderHoldSlots();
    this.renderConsumables();
    this.renderTourTargets();
  },

  renderBoard() {
    const cells = this.boardEl.children;
    const gs = Board.size;
    for (let r = 0; r < gs; r++) {
      for (let c = 0; c < gs; c++) {
        const cell = cells[r * gs + c];
        if (!cell) continue;
        const val = Board.grid[r][c];
        // Reset classes
        cell.className = 'cell';
        cell.style.setProperty('--piece-color', '');

        if (val) {
          if (val.type === 'wall') {
            cell.classList.add('cell-wall');
          } else if (val.type === 'stone') {
            cell.classList.add('cell-stone');
          } else if (val.type === 'ice') {
            cell.classList.add('cell-ice');
          } else if (val.type === 'glass') {
            cell.classList.add('cell-glass');
          } else if (val.type === 'shard') {
            cell.classList.add('cell-shard');
          } else {
            cell.classList.add('filled');
            cell.style.setProperty('--piece-color', val.color || '');
          }
        }
      }
    }
  },

  renderPieces() {
    this.trayEl.innerHTML = '';
    Game.pieces.forEach((piece, idx) => {
      const container = document.createElement('div');
      container.className = 'piece-container' + (piece.placed ? ' placed' : '');
      container.dataset.pieceIdx = idx;

      if (!piece.placed && piece.cells.length > 0) {
        const bounds = PieceFactory.getBounds(piece.cells);
        const grid = document.createElement('div');
        grid.className = 'piece-grid';
        const cellSize = Math.min(28, (window.innerWidth * 0.75 - 60) / (3 * 5));
        grid.style.gridTemplateColumns = `repeat(${bounds.cols}, ${cellSize}px)`;
        grid.style.gridTemplateRows = `repeat(${bounds.rows}, ${cellSize}px)`;
        grid.style.setProperty('--piece-color', piece.color);

        const cellSet = new Set(piece.cells.map(([r,c]) => `${r},${c}`));
        for (let r = 0; r < bounds.rows; r++) {
          for (let c = 0; c < bounds.cols; c++) {
            const cell = document.createElement('div');
            cell.className = cellSet.has(`${r},${c}`) ? 'piece-cell' : 'piece-cell empty';
            grid.appendChild(cell);
          }
        }
        container.appendChild(grid);

        if (SaveData.hasUpgrade('rotation')) {
          const indicator = document.createElement('div');
          indicator.className = 'rotate-indicator';
          indicator.textContent = 'tap to rotate';
          container.appendChild(indicator);
        }

        // Show hold button when both rotation and hold are unlocked
        if (SaveData.hasUpgrade('rotation') && Game.holdSlots.length > 0) {
          const holdBtn = document.createElement('button');
          holdBtn.className = 'piece-hold-btn';
          holdBtn.textContent = 'hold';
          holdBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            Game.holdPiece(idx);
          });
          holdBtn.addEventListener('mousedown', (e) => e.stopPropagation());
          holdBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: false });
          container.appendChild(holdBtn);
        }
      }

      this.trayEl.appendChild(container);
    });
  },

  renderHUD() {
    document.getElementById('hud-score').textContent = Game.score.toLocaleString();
    const streakEl = document.getElementById('hud-streak');
    if (Game.streak > 0) {
      streakEl.textContent = '\uD83D\uDD25 x' + Game.streak;
    } else {
      streakEl.textContent = '';
    }
    const livesEl = document.getElementById('hud-lives');
    if (Game.livesLeft > 0) {
      livesEl.textContent = '\u2764\uFE0F'.repeat(Game.livesLeft);
      livesEl.classList.remove('inactive');
    } else if ((!Game.tourMode && SaveData.getTier('life1') > 0) || (Game.tourMode && (TourSave.tourLives > 0 || TourSave.bonusLives > 0))) {
      livesEl.textContent = '\uD83D\uDDA4';
      livesEl.classList.add('inactive');
    } else {
      livesEl.textContent = '';
    }
    this.renderTourTargets();
  },

  renderTourTargets() {
    const container = document.getElementById('tour-targets');
    const scoreRow = document.getElementById('tour-target-score');
    const linesRow = document.getElementById('tour-target-lines');

    if (!Game.tourMode || !Game.tourLevel) {
      container.classList.remove('active');
      return;
    }
    container.classList.add('active');
    const level = Game.tourLevel;

    if (level.scoreTarget > 0) {
      scoreRow.style.display = '';
      const pct = Math.min(100, (Game.score / level.scoreTarget) * 100);
      document.getElementById('tour-score-fill').style.width = pct + '%';
      const valEl = document.getElementById('tour-score-value');
      valEl.textContent = `${Game.score.toLocaleString()} / ${level.scoreTarget.toLocaleString()}`;
      valEl.className = 'tour-target-value' + (Game.score >= level.scoreTarget ? ' met' : '');
    } else {
      scoreRow.style.display = 'none';
    }

    if (level.linesTarget > 0) {
      linesRow.style.display = '';
      const pct = Math.min(100, (Game.linesCleared / level.linesTarget) * 100);
      document.getElementById('tour-lines-fill').style.width = pct + '%';
      const valEl = document.getElementById('tour-lines-value');
      valEl.textContent = `${Game.linesCleared} / ${level.linesTarget}`;
      valEl.className = 'tour-target-value' + (Game.linesCleared >= level.linesTarget ? ' met' : '');
    } else {
      linesRow.style.display = 'none';
    }
  },

  renderHoldSlots() {
    const container = document.getElementById('hold-slots');
    container.innerHTML = '';
    Game.holdSlots.forEach((piece, idx) => {
      const slot = document.createElement('div');
      slot.className = 'hold-slot' + (piece ? ' occupied' : '');
      slot.dataset.holdIdx = idx;

      if (piece) {
        const bounds = PieceFactory.getBounds(piece.cells);
        const grid = document.createElement('div');
        grid.className = 'piece-grid';
        const maxDim = Math.max(bounds.rows, bounds.cols);
        const cellSize = Math.floor((40 - (maxDim - 1) * 2) / maxDim);
        grid.style.gridTemplateColumns = `repeat(${bounds.cols}, ${cellSize}px)`;
        grid.style.gridTemplateRows = `repeat(${bounds.rows}, ${cellSize}px)`;
        grid.style.setProperty('--piece-color', piece.color);
        const cellSet = new Set(piece.cells.map(([r,c]) => `${r},${c}`));
        for (let r = 0; r < bounds.rows; r++) {
          for (let c = 0; c < bounds.cols; c++) {
            const cell = document.createElement('div');
            cell.className = cellSet.has(`${r},${c}`) ? 'piece-cell' : 'piece-cell empty';
            grid.appendChild(cell);
          }
        }
        slot.appendChild(grid);
      }

      const label = document.createElement('div');
      label.className = 'hold-slot-label';
      label.textContent = 'hold';
      slot.appendChild(label);
      slot.addEventListener('click', () => Game.retrieveHold(idx));
      container.appendChild(slot);
    });
  },

  renderConsumables() {
    const container = document.getElementById('consumables');
    container.innerHTML = '';

    // Bomb button - show if player has bomb upgrade (free play) or tour bombs (tour mode)
    const showBomb = Game.tourMode ? (Game.bombsLeft > 0 || TourSave.tourBombs > 0) : SaveData.getTier('bomb') > 0;
    if (showBomb) {
      const btn = document.createElement('button');
      btn.className = 'consumable-btn' + (Game.bombMode ? ' active-mode' : '');
      btn.disabled = Game.bombsLeft <= 0;
      btn.innerHTML = '\uD83D\uDCA3';
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = Game.bombsLeft;
      btn.appendChild(badge);
      btn.addEventListener('click', () => {
        Game.bombMode = !Game.bombMode;
        Game.cleanerMode = null;
        Renderer.renderConsumables();
      });
      container.appendChild(btn);
    }

    // Shuffle button
    const showShuffle = Game.tourMode ? (Game.shufflesLeft > 0 || TourSave.tourShuffles > 0) : SaveData.getTier('shuffle') > 0;
    if (showShuffle) {
      const btn = document.createElement('button');
      btn.className = 'consumable-btn';
      btn.disabled = Game.shufflesLeft <= 0;
      btn.innerHTML = '\uD83D\uDD00';
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = Game.shufflesLeft;
      btn.appendChild(badge);
      btn.addEventListener('click', () => Game.useShuffle());
      container.appendChild(btn);
    }

    // Block Cleaner buttons (only in tour mode)
    if (Game.tourMode) {
      const cleanerSizes = [
        { size: 1, key: 'cleaners1x1', label: '1' },
        { size: 2, key: 'cleaners2x2', label: '2' },
        { size: 3, key: 'cleaners3x3', label: '3' },
      ];
      cleanerSizes.forEach(cs => {
        const count = TourSave[cs.key];
        if (count > 0) {
          const btn = document.createElement('button');
          btn.className = 'consumable-btn' + (Game.cleanerMode === cs.size ? ' active-mode-cleaner' : '');
          btn.innerHTML = '\uD83E\uDDF9';
          const sizeLabel = document.createElement('span');
          sizeLabel.className = 'size-label';
          sizeLabel.textContent = cs.label + 'x' + cs.label;
          btn.appendChild(sizeLabel);
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = count;
          btn.appendChild(badge);
          btn.addEventListener('click', () => {
            if (Game.cleanerMode === cs.size) {
              Game.cleanerMode = null;
            } else {
              Game.cleanerMode = cs.size;
              Game.bombMode = false;
            }
            Renderer.renderConsumables();
          });
          container.appendChild(btn);
        }
      });
    }
  },

  clearGhost() {
    this.boardEl.querySelectorAll('.ghost, .invalid-ghost').forEach(c => {
      c.classList.remove('ghost', 'invalid-ghost');
      const r = +c.dataset.row;
      const col = +c.dataset.col;
      const val = Board.grid[r]?.[col];
      c.style.setProperty('--piece-color', val?.color || '');
    });
  },

  showGhost(cells, row, col, color) {
    this.clearGhost();
    const valid = Board.canPlace(cells, row, col);
    const gs = Board.size;
    cells.forEach(([r, c]) => {
      const gr = row + r, gc = col + c;
      if (gr >= 0 && gr < gs && gc >= 0 && gc < gs) {
        const cell = this.boardEl.children[gr * gs + gc];
        if (!Board.grid[gr][gc]) {
          cell.classList.add(valid ? 'ghost' : 'invalid-ghost');
          cell.style.setProperty('--piece-color', color);
        }
      }
    });
  },

  async animateClear(rows, cols) {
    const cellEls = this.boardEl.children;
    const gs = Board.size;
    const targets = new Set();
    rows.forEach(r => { for (let c = 0; c < gs; c++) targets.add(r * gs + c); });
    cols.forEach(c => { for (let r = 0; r < gs; r++) targets.add(r * gs + c); });

    targets.forEach(i => cellEls[i].classList.add('clearing'));
    await new Promise(r => setTimeout(r, 180));
    targets.forEach(i => { cellEls[i].classList.remove('clearing'); cellEls[i].classList.add('clearing-out'); });
    await new Promise(r => setTimeout(r, 280));
    targets.forEach(i => cellEls[i].classList.remove('clearing-out'));
  },

  showCombo(points, streak, lines) {
    const wrapper = document.getElementById('board-wrapper');
    const popup = document.createElement('div');
    popup.className = 'combo-popup' + (streak >= 3 ? ' fire' : '');
    popup.textContent = `+${points.toLocaleString()}`;
    if (streak > 1) popup.textContent += ` x${streak}`;
    if (lines > 1) popup.textContent += ` (${lines} lines!)`;
    popup.style.left = '50%';
    popup.style.top = '40%';
    popup.style.transform = 'translateX(-50%)';
    wrapper.appendChild(popup);
    setTimeout(() => popup.remove(), 850);
  },

  async showRescue() {
    const overlay = document.createElement('div');
    overlay.className = 'rescue-overlay';
    overlay.innerHTML = '<div class="rescue-text">RESCUED!</div>';
    document.body.appendChild(overlay);
    await new Promise(r => setTimeout(r, 700));
    overlay.remove();
  },

  showGameOver(data) {
    const titleEl = document.getElementById('gameover-title');
    const buttonsEl = document.getElementById('gameover-buttons');
    const warningEl = document.getElementById('gameover-tour-warning');

    titleEl.textContent = 'Run Over';
    titleEl.style.color = 'var(--color-red)';
    warningEl.style.display = 'none';
    buttonsEl.innerHTML = `
      <button class="btn btn-primary" onclick="App.startRun()">Play Again</button>
      <button class="btn btn-accent" onclick="App.showScreen('shop')">Shop</button>
      <button class="btn btn-secondary" onclick="App.showScreen('menu')">Menu</button>
    `;

    document.getElementById('gameover-best').style.display = data.isNewBest ? 'block' : 'none';
    document.getElementById('gameover-stats').innerHTML = `
      <span class="label">Score</span><span class="value">${data.score.toLocaleString()}</span>
      <span class="label">Lines</span><span class="value">${data.lines}</span>
      <span class="label">Best Streak</span><span class="value">${data.maxStreak}</span>
      <span class="label">Turns</span><span class="value">${data.turns}</span>
    `;
    document.getElementById('star-breakdown').className = 'star-breakdown';
    document.getElementById('star-breakdown').innerHTML = `
      <h3>\u2B50 Stars Earned</h3>
      <div class="star-row"><span>Score</span><span>+${data.starScore}</span></div>
      <div class="star-row"><span>Lines</span><span>+${data.starLines}</span></div>
      <div class="star-row"><span>Combo</span><span>+${data.starCombo}</span></div>
      <div class="star-row"><span>Survival</span><span>+${data.starSurvival}</span></div>
      <div class="star-row total"><span>Total</span><span>\u2B50 ${data.totalStars}</span></div>
    `;
    App.showScreen('gameover');
  },

  showTourOver(data) {
    const titleEl = document.getElementById('gameover-title');
    const buttonsEl = document.getElementById('gameover-buttons');
    const warningEl = document.getElementById('gameover-tour-warning');

    titleEl.textContent = 'Tour Over!';
    titleEl.style.color = 'var(--color-red)';
    warningEl.style.display = 'block';
    warningEl.textContent = 'All tour progress will be reset!';

    document.getElementById('gameover-best').style.display = 'none';
    document.getElementById('gameover-stats').innerHTML = `
      <span class="label">Score</span><span class="value">${data.score.toLocaleString()}</span>
      <span class="label">Lines</span><span class="value">${data.lines}</span>
      <span class="label">Best Streak</span><span class="value">${data.maxStreak}</span>
      <span class="label">Turns</span><span class="value">${data.turns}</span>
      <span class="label">Towns Completed</span><span class="value">${data.levelsCompleted}</span>
    `;
    document.getElementById('star-breakdown').className = 'star-breakdown tour-stars-border';
    document.getElementById('star-breakdown').innerHTML = `
      <h3 class="tour-star-heading">\uD83D\uDC8E Tour Stars Earned</h3>
      <div class="star-row"><span>Score</span><span>+${data.starScore}</span></div>
      <div class="star-row"><span>Lines</span><span>+${data.starLines}</span></div>
      <div class="star-row"><span>Combo</span><span>+${data.starCombo}</span></div>
      <div class="star-row"><span>Survival</span><span>+${data.starSurvival}</span></div>
      <div class="star-row total tour-star-total"><span>Total</span><span>\uD83D\uDC8E ${data.totalStars}</span></div>
    `;

    buttonsEl.innerHTML = `
      <button class="btn btn-tour" onclick="App.tourFullReset()">Start Over</button>
      <button class="btn btn-secondary" onclick="App.showScreen('menu')">Main Menu</button>
    `;

    App.showScreen('gameover');
  },

  showLevelComplete(data) {
    document.getElementById('lc-town').textContent = data.town;
    let statsHTML = '';
    if (data.scoreTarget > 0) {
      statsHTML += `<span class="label">Score</span><span class="value">${data.score.toLocaleString()} / ${data.scoreTarget.toLocaleString()}</span>`;
    }
    if (data.linesTarget > 0) {
      statsHTML += `<span class="label">Lines</span><span class="value">${data.lines} / ${data.linesTarget}</span>`;
    }
    document.getElementById('lc-stats').innerHTML = statsHTML;

    document.getElementById('lc-star-breakdown').innerHTML = `
      <h3 class="tour-star-heading">\uD83D\uDC8E Tour Stars Earned</h3>
      <div class="star-row"><span>Score</span><span>+${data.starScore}</span></div>
      <div class="star-row"><span>Lines</span><span>+${data.starLines}</span></div>
      <div class="star-row"><span>Combo</span><span>+${data.starCombo}</span></div>
      <div class="star-row"><span>Survival</span><span>+${data.starSurvival}</span></div>
      <div class="star-row total tour-star-total"><span>Total</span><span>\uD83D\uDC8E ${data.totalStars}</span></div>
    `;

    const rewardEl = document.getElementById('lc-reward');
    if (data.reward === 'bonusLife') {
      rewardEl.style.display = '';
      rewardEl.textContent = '\u2764\uFE0F Permanent +1 Extra Life earned!';
    } else {
      rewardEl.style.display = 'none';
    }

    App.showScreen('levelcomplete');
  },

  renderMenu() {
    document.getElementById('menu-stars').textContent = `\u2B50 ${SaveData.stars} Stars`;
    document.getElementById('menu-stats').textContent = `Best: ${SaveData.bestScore.toLocaleString()}  |  Runs: ${SaveData.totalRuns}  |  Lines: ${SaveData.totalLinesCleared}`;
    const continueBtn = document.getElementById('btn-continue');
    if (Game.hasSavedRun()) {
      continueBtn.style.display = '';
    } else {
      continueBtn.style.display = 'none';
    }
    const continueTourBtn = document.getElementById('btn-continue-tour');
    if (Game.hasSavedTourRun()) {
      continueTourBtn.style.display = '';
    } else {
      continueTourBtn.style.display = 'none';
    }
    document.getElementById('menu-tour-progress').textContent = `Tour: ${TourSave.completed.length}/${WORLD_TOUR.length}`;
  },

  renderShop() {
    document.getElementById('shop-stars').textContent = `\u2B50 ${SaveData.stars}`;
    const grid = document.getElementById('shop-grid');
    grid.innerHTML = '';

    UPGRADES.forEach(upg => {
      const currentTier = SaveData.getTier(upg.id);
      const maxed = currentTier >= upg.maxTier;
      const cost = maxed ? 0 : upg.costs[currentTier];
      const canAfford = SaveData.stars >= cost;
      const reqMet = !upg.req || SaveData.hasUpgrade(upg.req);
      const locked = !reqMet;

      const card = document.createElement('div');
      card.className = 'upgrade-card' + (maxed ? ' owned' : '') + (locked ? ' locked' : '');

      let tiersHTML = '';
      if (upg.maxTier > 1) {
        tiersHTML = '<div class="upgrade-tiers">' +
          Array.from({ length: upg.maxTier }, (_, i) =>
            `<div class="tier-dot${i < currentTier ? ' filled' : ''}"></div>`
          ).join('') + '</div>';
      }

      let reqHTML = '';
      if (locked) {
        const reqUpg = UPGRADES.find(u => u.id === upg.req);
        reqHTML = `<div class="upgrade-req">Requires: ${reqUpg?.name || upg.req}</div>`;
      }

      card.innerHTML = `
        <div style="font-size:1.5rem;min-width:36px;text-align:center;">${upg.icon}</div>
        <div class="upgrade-info">
          <div class="upgrade-name">${upg.name}${upg.maxTier > 1 ? ` (${currentTier}/${upg.maxTier})` : ''}</div>
          <div class="upgrade-desc">${upg.desc}</div>
          ${tiersHTML}${reqHTML}
        </div>
        <div class="upgrade-action">
          ${maxed ? '<span class="owned-badge">Owned \u2713</span>' :
            locked ? '<span style="font-size:0.75rem;color:#666;">\uD83D\uDD12 Locked</span>' :
            `<button class="btn-buy" ${!canAfford ? 'disabled' : ''}>\u2B50 ${cost}</button>`
          }
        </div>
      `;

      if (!maxed && !locked) {
        const btn = card.querySelector('.btn-buy');
        if (btn && canAfford) {
          btn.addEventListener('click', () => {
            SaveData.purchase(upg.id, cost);
            this.renderShop();
          });
        }
      }

      grid.appendChild(card);
    });
  },

  renderTourShop() {
    document.getElementById('tourshop-stars').textContent = `\uD83D\uDC8E ${TourSave.stars}`;
    const grid = document.getElementById('tourshop-grid');
    grid.innerHTML = '';

    TOUR_SHOP_ITEMS.forEach(item => {
      const canAfford = TourSave.stars >= item.cost;
      const currentCount = TourSave[item.id] || 0;

      const card = document.createElement('div');
      card.className = 'upgrade-card';

      card.innerHTML = `
        <div style="font-size:1.5rem;min-width:36px;text-align:center;">${item.icon}</div>
        <div class="upgrade-info">
          <div class="upgrade-name">${item.name}</div>
          <div class="upgrade-desc">${item.desc}</div>
          <div style="font-size:0.7rem;color:var(--text-secondary);margin-top:3px;">Owned: ${currentCount}</div>
        </div>
        <div class="upgrade-action">
          <button class="btn-buy-tour" ${!canAfford ? 'disabled' : ''}>\uD83D\uDC8E ${item.cost}</button>
        </div>
      `;

      const btn = card.querySelector('.btn-buy-tour');
      if (btn && canAfford) {
        btn.addEventListener('click', () => {
          TourSave.stars -= item.cost;
          TourSave[item.id] = (TourSave[item.id] || 0) + item.qty;
          TourSave.save();
          this.renderTourShop();
        });
      }

      grid.appendChild(card);
    });
  },

  renderTourMap() {
    document.getElementById('tour-progress').textContent = `${TourSave.completed.length}/${WORLD_TOUR.length}`;
    document.getElementById('tour-star-count').textContent = `\uD83D\uDC8E ${TourSave.stars}`;

    const mapInner = document.getElementById('tour-map-inner');
    // Remove old towns and svg lines (keep .tour-map-bg)
    mapInner.querySelectorAll('.tour-town').forEach(el => el.remove());

    const svg = document.getElementById('tour-route-svg');
    svg.innerHTML = '';

    // Draw route lines
    WORLD_TOUR.forEach(level => {
      if (!level.next) return;
      level.next.forEach(nextId => {
        const nextLevel = WORLD_TOUR_BY_ID[nextId];
        if (!nextLevel) return;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', level.pos[0] + '%');
        line.setAttribute('y1', level.pos[1] + '%');
        line.setAttribute('x2', nextLevel.pos[0] + '%');
        line.setAttribute('y2', nextLevel.pos[1] + '%');
        let cls = 'tour-route-line';
        if (TourSave.isCompleted(level.id) && TourSave.isCompleted(nextId)) {
          cls += ' completed';
        } else if (TourSave.isUnlocked(level.id) || TourSave.isUnlocked(nextId)) {
          cls += ' unlocked';
        }
        line.setAttribute('class', cls);
        svg.appendChild(line);
      });
    });

    // Draw town dots
    WORLD_TOUR.forEach(level => {
      const dot = document.createElement('div');
      dot.className = 'tour-town';
      dot.style.left = level.pos[0] + '%';
      dot.style.top = level.pos[1] + '%';

      if (TourSave.isCompleted(level.id)) {
        dot.classList.add('tour-town-completed');
      } else if (TourSave.isUnlocked(level.id)) {
        dot.classList.add('tour-town-available');
      } else {
        dot.classList.add('tour-town-locked');
      }

      const label = document.createElement('div');
      label.className = 'tour-town-label';
      label.textContent = level.town;
      dot.appendChild(label);

      dot.addEventListener('click', () => {
        if (!dot.classList.contains('tour-town-locked')) {
          this.showTourDetail(level);
        }
      });

      mapInner.appendChild(dot);
    });

    // Scroll to center on Newburyport area
    const container = document.querySelector('.tour-map-container');
    const newburyport = WORLD_TOUR[0];
    const targetX = (newburyport.pos[0] / 100) * mapInner.offsetWidth - container.offsetWidth / 2;
    const targetY = (newburyport.pos[1] / 100) * mapInner.offsetHeight - container.offsetHeight / 2;
    container.scrollLeft = Math.max(0, targetX);
    container.scrollTop = Math.max(0, targetY);
  },

  showTourDetail(level) {
    const detail = document.getElementById('tour-detail');
    const card = document.getElementById('tour-detail-card');

    let conditionsHTML = '';
    if (level.scoreTarget > 0) {
      conditionsHTML += `<div class="tour-detail-row"><span class="label">Score Target</span><span class="value">${level.scoreTarget.toLocaleString()}</span></div>`;
    }
    if (level.linesTarget > 0) {
      conditionsHTML += `<div class="tour-detail-row"><span class="label">Lines Target</span><span class="value">${level.linesTarget}</span></div>`;
    }
    conditionsHTML += `<div class="tour-detail-row"><span class="label">Grid Size</span><span class="value">${level.grid}x${level.grid}</span></div>`;

    const completed = TourSave.isCompleted(level.id);
    const bestScore = TourSave.bestScores[level.id];
    let bestHTML = '';
    if (bestScore) {
      bestHTML = `<div class="tour-detail-best">Best: ${bestScore.toLocaleString()}</div>`;
    }

    let statusHTML = '';
    if (completed) {
      statusHTML = `<span style="color:var(--color-green);font-weight:700;">Completed \u2713</span>`;
    }

    let buttonsHTML = '';
    if (TourSave.isUnlocked(level.id)) {
      const btnLabel = completed ? 'Play Again' : 'Play';
      buttonsHTML = `
        <button class="btn btn-tour" onclick="App.startTourLevel(${level.id})" style="padding:10px 30px;">${btnLabel}</button>
        <button class="btn btn-secondary" onclick="Renderer.closeTourDetail()" style="padding:10px 20px;">Close</button>
      `;
    } else {
      buttonsHTML = `
        <div style="color:var(--tour-star);font-size:0.85rem;">\uD83D\uDC8E Unlock cost: ${level.unlock} tour stars</div>
        <button class="btn btn-secondary" onclick="Renderer.closeTourDetail()" style="padding:10px 20px;">Close</button>
      `;
    }

    card.innerHTML = `
      <div class="tour-detail-town">${level.town}</div>
      <div class="tour-detail-desc">${level.desc}</div>
      ${statusHTML}
      <div class="tour-detail-info">${conditionsHTML}</div>
      ${bestHTML}
      <div class="tour-detail-buttons">${buttonsHTML}</div>
    `;

    detail.classList.add('active');
  },

  closeTourDetail() {
    document.getElementById('tour-detail').classList.remove('active');
  }
};

// ===== DRAG CONTROLLER =====
const DragController = {
  dragging: false,
  dragPiece: null,
  dragPieceIdx: -1,
  dragFromHold: false,
  floatEl: null,
  startX: 0, startY: 0, startTime: 0,
  offsetX: 0, offsetY: 0,

  // Convert screen position (top-left of float) to grid row/col
  screenToGrid(screenX, screenY) {
    const boardRect = Renderer.boardEl.getBoundingClientRect();
    const padding = 3;
    const gap = 2;
    const gs = Board.size;
    const innerWidth = boardRect.width - 2 * padding;
    const cellW = (innerWidth - (gs - 1) * gap) / gs;
    const stride = cellW + gap;
    const gridCol = Math.round((screenX - boardRect.left - padding) / stride);
    const gridRow = Math.round((screenY - boardRect.top - padding) / stride);
    return { gridRow, gridCol };
  },

  init() {
    const tray = document.getElementById('piece-tray');
    const board = document.getElementById('board');
    const holdContainer = document.getElementById('hold-slots');

    // Piece tray events
    tray.addEventListener('mousedown', e => this.onStart(e, false));
    tray.addEventListener('touchstart', e => this.onStart(e, false), { passive: false });

    // Hold slot drag events
    holdContainer.addEventListener('mousedown', e => this.onHoldStart(e));
    holdContainer.addEventListener('touchstart', e => this.onHoldStart(e), { passive: false });

    // Board events (for bomb mode and cleaner mode)
    board.addEventListener('click', async e => {
      const cell = e.target.closest('.cell');
      if (!cell) return;
      const row = +cell.dataset.row;
      const col = +cell.dataset.col;

      if (Game.bombMode && Game.bombsLeft > 0) {
        await Game.useBomb(row, col);
      } else if (Game.cleanerMode !== null) {
        await Game.useCleaner(row, col, Game.cleanerMode);
      }
    });

    document.addEventListener('mousemove', e => this.onMove(e));
    document.addEventListener('touchmove', e => this.onMove(e), { passive: false });
    document.addEventListener('mouseup', e => this.onEnd(e));
    document.addEventListener('touchend', e => this.onEnd(e));
  },

  onHoldStart(e) {
    const slot = e.target.closest('.hold-slot');
    if (!slot || !slot.classList.contains('occupied')) return;

    const idx = +slot.dataset.holdIdx;
    const piece = Game.holdSlots[idx];
    if (!piece) return;

    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    this.startX = touch.clientX;
    this.startY = touch.clientY;
    this.startTime = Date.now();
    this.dragPiece = piece;
    this.dragPieceIdx = idx;
    this.dragFromHold = true;
    this.dragging = false;
    this._pendingHoldDrag = true;
  },

  onStart(e, fromHold) {
    const container = e.target.closest('.piece-container');
    if (!container || container.classList.contains('placed')) return;

    e.preventDefault();
    const idx = +container.dataset.pieceIdx;
    const piece = Game.pieces[idx];
    if (!piece || piece.placed) return;

    const touch = e.touches ? e.touches[0] : e;
    this.startX = touch.clientX;
    this.startY = touch.clientY;
    this.startTime = Date.now();
    this.dragPiece = piece;
    this.dragPieceIdx = idx;
    this.dragFromHold = false;
    this.dragging = false;
    this._pendingTrayDrag = true;
  },

  onMove(e) {
    const touch = e.touches ? e.touches[0] : e;
    const dx = touch.clientX - this.startX;
    const dy = touch.clientY - this.startY;

    const dragThreshold = e.touches ? 20 : 10;
    if ((this._pendingTrayDrag || this._pendingHoldDrag) && !this.dragging) {
      if (Math.abs(dx) > dragThreshold || Math.abs(dy) > dragThreshold) {
        this.dragging = true;
        this.createFloat(touch.clientX, touch.clientY);
        if (this._pendingTrayDrag) {
          const container = document.querySelector(`.piece-container[data-piece-idx="${this.dragPieceIdx}"]`);
          if (container) container.classList.add('dragging');
        }
      } else {
        return;
      }
    }

    if (!this.dragging) return;
    e.preventDefault();

    const yOff = e.touches ? -60 : -30;
    this.floatEl.style.left = (touch.clientX - this.offsetX) + 'px';
    this.floatEl.style.top = (touch.clientY - this.offsetY + yOff) + 'px';

    const { gridRow, gridCol } = this.screenToGrid(touch.clientX - this.offsetX, touch.clientY - this.offsetY + yOff);
    const gs = Board.size;

    Renderer.clearGhost();
    if (gridRow >= -2 && gridRow < gs + 2 && gridCol >= -2 && gridCol < gs + 2) {
      Renderer.showGhost(this.dragPiece.cells, gridRow, gridCol, this.dragPiece.color);
    }
  },

  async onEnd(e) {
    const touch = e.changedTouches ? e.changedTouches[0] : e;
    const elapsed = Date.now() - this.startTime;
    const dx = touch.clientX - this.startX;
    const dy = touch.clientY - this.startY;
    const tapThreshold = e.changedTouches ? 20 : 12;
    const wasTap = elapsed < 300 && Math.abs(dx) < tapThreshold && Math.abs(dy) < tapThreshold;

    if (this._pendingHoldDrag && !this.dragging) {
      if (wasTap) Game.retrieveHold(this.dragPieceIdx);
      this._pendingHoldDrag = false;
      return;
    }

    if (this._pendingTrayDrag && !this.dragging) {
      if (wasTap) {
        if (SaveData.hasUpgrade('rotation')) {
          Game.rotatePiece(this.dragPieceIdx);
        } else if (Game.holdSlots.length > 0) {
          Game.holdPiece(this.dragPieceIdx);
        }
      }
      this._pendingTrayDrag = false;
      return;
    }

    if (!this.dragging) {
      this._pendingTrayDrag = false;
      this._pendingHoldDrag = false;
      return;
    }

    const yOff = e.changedTouches ? -60 : -30;
    const { gridRow, gridCol } = this.screenToGrid(touch.clientX - this.offsetX, touch.clientY - this.offsetY + yOff);

    Renderer.clearGhost();
    this.removeFloat();

    await Game.placePiece(this.dragPieceIdx, gridRow, gridCol, this.dragFromHold);

    if (!this.dragFromHold) {
      const container = document.querySelector(`.piece-container[data-piece-idx="${this.dragPieceIdx}"]`);
      if (container) container.classList.remove('dragging');
    }

    this.dragging = false;
    this._pendingTrayDrag = false;
    this._pendingHoldDrag = false;
  },

  createFloat(x, y) {
    const piece = this.dragPiece;
    const bounds = PieceFactory.getBounds(piece.cells);
    const boardRect = Renderer.boardEl.getBoundingClientRect();
    const padding = 3;
    const gap = 2;
    const gs = Board.size;
    const cellSize = (boardRect.width - 2 * padding - (gs - 1) * gap) / gs;
    const stride = cellSize + gap;

    const container = document.createElement('div');
    container.className = 'drag-float';
    const grid = document.createElement('div');
    grid.className = 'piece-grid';
    grid.style.gridTemplateColumns = `repeat(${bounds.cols}, ${cellSize}px)`;
    grid.style.gridTemplateRows = `repeat(${bounds.rows}, ${cellSize}px)`;
    grid.style.setProperty('--piece-color', piece.color);
    grid.style.gap = gap + 'px';

    const cellSet = new Set(piece.cells.map(([r,c]) => `${r},${c}`));
    for (let r = 0; r < bounds.rows; r++) {
      for (let c = 0; c < bounds.cols; c++) {
        const cell = document.createElement('div');
        cell.className = cellSet.has(`${r},${c}`) ? 'piece-cell' : 'piece-cell empty';
        grid.appendChild(cell);
      }
    }
    container.appendChild(grid);

    this.offsetX = (bounds.cols * stride - gap) / 2;
    this.offsetY = (bounds.rows * stride - gap) / 2;

    document.body.appendChild(container);
    this.floatEl = container;
  },

  removeFloat() {
    if (this.floatEl) {
      this.floatEl.remove();
      this.floatEl = null;
    }
  }
};

// ===== APP =====
const App = {
  init() {
    SaveData.load();
    TourSave.load();
    Renderer.init(10);
    DragController.init();
    this.showScreen('menu');
  },

  showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(`screen-${name}`).classList.add('active');
    if (name === 'menu') Renderer.renderMenu();
    if (name === 'shop') Renderer.renderShop();
    if (name === 'tourshop') Renderer.renderTourShop();
    if (name === 'tour') Renderer.renderTourMap();
    // Close tour detail if leaving tour screen
    if (name !== 'tour') Renderer.closeTourDetail();
  },

  startRun() {
    this.showScreen('game');
    Game.start();
  },

  continueRun() {
    this.showScreen('game');
    Game.resumeRun();
  },

  continueTourRun() {
    this.showScreen('game');
    Game.resumeTourRun();
  },

  startTourLevel(id) {
    Renderer.closeTourDetail();
    this.showScreen('game');
    Game.startTourLevel(id);
  },

  retryTourLevel(id) {
    this.showScreen('game');
    Game.startTourLevel(id);
  },

  tourFullReset() {
    TourSave.fullReset();
    this.showScreen('tour');
  },

  pauseToMenu() {
    if (Game.tourMode) {
      App.showScreen('tour');
    } else {
      App.showScreen('menu');
    }
  }
};

// Initialize
document.addEventListener('DOMContentLoaded', () => App.init());
